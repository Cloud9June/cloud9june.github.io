<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선생님 전용 메시지 보관함</title>
    <!-- 폰트 추가: 나눔펜, 나눔고딕, 고운바탕, 주아체 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&family=Gowun+Batang:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Nanum Pen Script', cursive; background-color: #fdfcf0; margin: 0; padding: 0; text-align: center; }
        
        /* 상단 컨트롤 영역 */
        .header-section { padding: 5px 0 20px 0; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d32f2f; margin-bottom: 20px; font-size: 3rem; }
        .controls { background: #fff5f5; padding: 25px; border-radius: 15px; display: inline-block; border: 1px solid #ffcdd2; }
        
        /* 스타일 절대 유지: 선택창 디자인 */
        select { font-family: 'Nanum Pen Script', cursive; font-size: 1.6rem; padding: 8px 15px; border: 2px solid #ffb7b7; border-radius: 8px; outline: none; margin: 0 5px; background-color: white; cursor: pointer; }
        #teacherSelect { width: 300px; border-color: #1e88e5; } /* 목록 선택창은 살짝 더 넓게 */

        button { font-family: 'Nanum Pen Script', cursive; font-size: 1.6rem; padding: 8px 25px; cursor: pointer; border: none; border-radius: 8px; margin-left: 10px; transition: 0.3s; }
        .btn-save { background-color: #ff5252; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 📸 저장될 영역: 기존 스타일 유지 */
        #capture-area { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
            padding: 60px 40px; 
            min-height: 600px;
            position: relative;
            background-color: #fff9f9;
            background-image: linear-gradient(rgba(255, 249, 249, 0.65), rgba(255, 249, 249, 0.65)), 
                              url('images/flower.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Nanum Pen Script', cursive;
        }

        /* 개별 메모지 스타일 유지 */
        .memo-item {
            width: 220px; height: 220px; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.07);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .target { font-size: 1.4rem; color: #1e88e5; font-weight: bold; margin-bottom: 8px; }
        .content { font-size: 1.6rem; color: #333; line-height: 1.3; flex-grow: 1; display: flex; align-items: center; word-break: break-all; }
        .author { font-size: 1.2rem; color: #5d4037; border-top: 1px dashed rgba(0,0,0,0.1); width: 100%; padding-top: 8px; margin-top: 10px; }

        .c1 { background-color: rgba(255, 224, 230, 0.95); } 
        .c2 { background-color: rgba(255, 243, 191, 0.95); } 
        .c3 { background-color: rgba(209, 250, 229, 0.95); } 
        .c4 { background-color: rgba(224, 242, 254, 0.95); } 
        .c5 { background-color: rgba(243, 232, 255, 0.95); }

        .empty-msg { grid-column: 1/-1; font-size: 2.5rem; color: #999; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>💌 스승의 날 마음 보관함</h1>
        <div class="controls">
            <!-- 선생님 성함 입력창을 목록 선택창으로 교체 -->
            <select id="teacherSelect" onchange="filterMessages()">
                <option value="">선생님을 선택해주세요</option>
            </select>
            
            <select id="fontSelector" onchange="changeFont()">
                <option value="'Nanum Pen Script', cursive">기본 손글씨체</option>
                <option value="'Nanum Gothic', sans-serif">깔끔한 고딕체</option>
                <option value="'Gowun Batang', serif">정갈한 바탕체</option>
                <option value="'Jua', sans-serif">둥근 주아체</option>
            </select>

            <button class="btn-save" onclick="saveAsJpg()">이미지로 간직하기</button>
        </div>
    </div>

    <div id="capture-area">
        <p class="empty-msg">선생님 성함을 선택하여 <br> 마음을 확인하세요! 🌺</p>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyfblCa3JSYO9HyVSSkBQ_UW5MZWqjoB5tpUnVpFiicfW6sx60u9BeoFLzbatq_Npzn/exec";
    let allMessages = [];
    const colors = ['c1', 'c2', 'c3', 'c4', 'c5'];

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            allMessages = await res.json();
            updateTeacherList(); // 데이터 로딩 후 목록 생성
        } catch (e) { console.error("데이터 로드 실패", e); }
    }

    // 이름에서 괄호 내용을 제거하는 함수 (김찬희(여) -> 김찬희)
    function cleanName(name) {
        return name.replace(/\(.*\)/, "").replace(/\s+/g, " ").trim();
    }

    // 중복 없는 선생님 목록 생성 및 가나다 정렬
    function updateTeacherList() {
        const select = document.getElementById('teacherSelect');
        // target 필드 추출 -> 중복 제거 -> 가나다순 정렬
        const teacherNames = [...new Set(allMessages.map(m => m.target.trim()))].sort();
        
        teacherNames.forEach(name => {
            if(!name) return;
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name; // 목록에는 구분용 이름 그대로 표시
            select.appendChild(opt);
        });
    }

    function changeFont() {
        const selectedFont = document.getElementById('fontSelector').value;
        const area = document.getElementById('capture-area');
        area.style.fontFamily = selectedFont;
        
        if(selectedFont.includes('Nanum Gothic') || selectedFont.includes('Gowun Batang')) {
            area.style.fontWeight = "bold";
        } else {
            area.style.fontWeight = "normal";
        }
    }

    function filterMessages() {
        const selectedName = document.getElementById('teacherSelect').value;
        const area = document.getElementById('capture-area');
        
        if(!selectedName) { 
            area.innerHTML = '<p class="empty-msg">선생님 성함을 선택하여 <br> 마음을 확인하세요! 🌺</p>';
            return; 
        }

        const myMessages = allMessages.filter(m => m.target.trim() === selectedName);
        
        area.innerHTML = '';
        myMessages.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `memo-item ${colors[i % colors.length]}`;
            div.innerHTML = `
                <div class="target">${cleanName(m.target)}</div>
                <div class="content">${m.content}</div>
                <div class="author">From. ${m.name}</div>
            `;
            area.appendChild(div);
        });

        changeFont(); // 메시지 재생성 후 현재 설정된 폰트 적용
    }

    function saveAsJpg() {
        const area = document.getElementById('capture-area');
        const rawName = document.getElementById('teacherSelect').value || "선생님";
        const finalName = cleanName(rawName);
        
        if(document.querySelectorAll('.memo-item').length === 0) {
            alert("저장할 메시지가 없습니다!");
            return;
        }

        html2canvas(area, {
            useCORS: true,
            backgroundColor: "#fff9f9",
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${finalName}_스승의날_보관함.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
