<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선생님 전용 메시지 보관함</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Nanum Pen Script', cursive; background-color: #fdfcf0; margin: 0; padding: 0; text-align: center; }
        
        /* 상단 컨트롤 영역 */
        .header-section { padding: 5px 0 20px 0; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d32f2f; margin-bottom: 20px; font-size: 3rem; }
        .controls { background: #fff5f5; padding: 25px; border-radius: 15px; display: inline-block; border: 1px solid #ffcdd2; }
        input { font-family: 'Nanum Pen Script', cursive; font-size: 1.6rem; padding: 8px 15px; border: 2px solid #ffb7b7; border-radius: 8px; outline: none; width: 250px; }
        button { font-family: 'Nanum Pen Script', cursive; font-size: 1.6rem; padding: 8px 25px; cursor: pointer; border: none; border-radius: 8px; margin-left: 10px; transition: 0.3s; }
        .btn-search { background-color: #1e88e5; color: white; }
        .btn-save { background-color: #ff5252; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 📸 저장될 영역: 카네이션 배경 적용 */
        #capture-area { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
            padding: 60px 40px; 
            min-height: 600px;
            position: relative;
            /* 카네이션 배경 이미지 설정 */
            background-color: #fff9f9;
            background-image: linear-gradient(rgba(255, 249, 249, 0.65), rgba(255, 249, 249, 0.65)), 
                              url('images/flower.png');
            background-size: 100% 100%; /* 패턴 크기 조절 */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 개별 메모지 스타일 */
        .memo-item {
            width: 220px; height: 220px; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.07);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .target { font-size: 1.4rem; color: #1e88e5; font-weight: bold; margin-bottom: 8px; }
        .content { font-size: 1.6rem; color: #333; line-height: 1.3; flex-grow: 1; display: flex; align-items: center; word-break: break-all; }
        .author { font-size: 1.2rem; color: #5d4037; border-top: 1px dashed rgba(0,0,0,0.1); width: 100%; padding-top: 8px; margin-top: 10px; }

        /* 파스텔 색상 */
        .c1 { background-color: rgba(255, 224, 230, 0.95); } 
        .c2 { background-color: rgba(255, 243, 191, 0.95); } 
        .c3 { background-color: rgba(209, 250, 229, 0.95); } 
        .c4 { background-color: rgba(224, 242, 254, 0.95); } 
        .c5 { background-color: rgba(243, 232, 255, 0.95); }

        .empty-msg { grid-column: 1/-1; font-size: 2.5rem; color: #999; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>💌 스승의 날 마음 보관함</h1>
        <div class="controls">
            <input type="text" id="teacherName" placeholder="선생님 성함을 입력하세요">
            <button class="btn-search" onclick="filterMessages()">메시지 찾기</button>
            <button class="btn-save" onclick="saveAsJpg()">이미지로 간직하기</button>
        </div>
    </div>

    <!-- 이미지가 찍힐 영역 -->
    <div id="capture-area">
        <p class="empty-msg">선생님 성함을 입력하고 <br> '메시지 찾기'를 눌러주세요! 🌺</p>
    </div>

<script>
    // 기존 API_URL 사용
    const API_URL = "https://script.google.com/macros/s/AKfycbxTnrJqRT3kuJlC3OQMCmqIW8Ns9uPGcA2xrjDDpreLYiZL-wc5GcnDiR9aCYSw_gMF/exec";
    let allMessages = [];
    const colors = ['c1', 'c2', 'c3', 'c4', 'c5'];

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            allMessages = await res.json();
        } catch (e) { console.error("데이터 로드 실패", e); }
    }

    function filterMessages() {
        const name = document.getElementById('teacherName').value.trim();
        const area = document.getElementById('capture-area');
        if(!name) { alert("성함을 입력해주세요!"); return; }

        // target 필드에 검색어 포함 여부 확인
        const myMessages = allMessages.filter(m => m.target && m.target.includes(name));
        
        area.innerHTML = '';
        if(myMessages.length === 0) {
            area.innerHTML = '<p class="empty-msg">도착한 메시지가 아직 없네요. ㅠㅠ</p>';
            return;
        }

        myMessages.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `memo-item ${colors[i % colors.length]}`;
            div.innerHTML = `
                <div class="target">${m.target}</div>
                <div class="content">${m.content}</div>
                <div class="author">From. ${m.name}</div>
            `;
            area.appendChild(div);
        });
    }

    // JPG 저장 기능 (배경까지 깔끔하게 캡처)
    function saveAsJpg() {
        const area = document.getElementById('capture-area');
        const teacherName = document.getElementById('teacherName').value || "선생님";
        
        if(document.querySelectorAll('.memo-item').length === 0) {
            alert("저장할 메시지가 없습니다!");
            return;
        }

        // 캡처 시 배경이 잘 나오도록 설정
        html2canvas(area, {
            useCORS: true, // 외부 이미지 로드 허용
            backgroundColor: "#fff9f9"
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${teacherName}선생님_스승의날_보관함.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
