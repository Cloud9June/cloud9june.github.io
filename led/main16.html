<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오월 5분할 레이아웃</title>
    <link rel="stylesheet" href="style10.css">
</head>
<body>
    <div class="container">
        <div class="item notice">
            <iframe src="etc/names.html" frameborder="0" style="width: 100%; height: 100%;"></iframe>
        </div>
        
        <div class="item meal">
            <img src="images/100days.png" alt="100일 기념" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </div>
        
        <div class="item calendar">
            <div class="calendar-split">
                <iframe 
                    class="billboard-frame" 
                    srcdoc="<style>
                        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
                        img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 75%; display: block; }
                    </style>
                    <img src='images/3star_1.jpg' alt='전광판 이미지'>"
                    frameborder="0"
                    style="width: 100%; height: 100%; display: block;"
                ></iframe>
                
                <div class="calendar-main-wrapper" style="display: flex; width: 100%; height: 100%; gap: 2px; background: #000;">
                    <iframe
                        class="calendar-main"
                        src="etc/person.html"
                        frameborder="0"
                        style="flex: 1; width: 50%; height: 100%;"
                    ></iframe>
                    
                    <iframe
                        class="calendar-sub"
                        src="etc/member.html" 
                        frameborder="0"
                        style="flex: 1; width: 50%; height: 100%;"
                    ></iframe>
                </div>
            </div>
        </div>
        
        <div class="item d-day">
            <img src="images/football.png" alt="100일 기념" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </div>
    </div>
</body>
</html>
