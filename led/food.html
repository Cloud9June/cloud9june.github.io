<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium School Meal Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffcc;
            --accent-color: #ff0077;
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 96%;
            height: 96%; /* 여백 최소화 */
            display: flex;
            flex-direction: column;
            gap: 10px; /* 간격 축소 */
        }

        /* 메인 카드 */
        .main-card {
            flex: 1; /* 고정 비율 대신 유연하게 확장 */
            background: var(--card-bg);
            border-left: 8px solid var(--primary-color);
            border-radius: 15px;
            padding: 25px; /* 패딩 축소 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .label {
            font-size: 1.1rem; /* 크기 하향 */
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .date-display {
            font-size: 1.6rem; /* 크기 하향 */
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .menu-list {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.9rem; /* 3.9rem -> 2.8rem으로 조정 (짤림 방지 핵심) */
            line-height: 1.2;
            word-break: keep-all;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .calorie-tag {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1.1rem;
            background: var(--primary-color);
            color: #000;
            padding: 3px 15px;
            border-radius: 50px;
            font-weight: 900;
        }

        /* 하단 바 (짤리지 않게 높이 명시적 확보) */
        .info-bar {
            height: 60px; /* 높이 고정으로 안정성 확보 */
            display: flex;
            gap: 10px;
        }

        .info-box {
            flex: 1;
            background: var(--card-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem; /* 텍스트가 박스를 넘지 않게 조정 */
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; /* 줄바꿈 방지 */
        }

        .info-box span { color: var(--primary-color); font-weight: bold; margin-right: 5px; }

        /* 애니메이션 생략 가능 시 제거하여 리소스 절약 */
        .fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 내일 급식일 때 날짜 옆에 붙을 강조 태그 */
        .tomorrow-badge {
            background-color: var(--accent-color); /* 핑크색 계열 */
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 8px;
            vertical-align: middle;
            display: none; /* 기본은 숨김 */
        }

        /* 내일 모드일 때 메인 카드에 강조 테두리 효과 (선택사항) */
        .is-tomorrow {
            border-left-color: var(--accent-color) !important;
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <div class="main-card">
            <div class="label">TODAY'S LUNCH MENU</div>
            <div id="date" class="date-display">데이터 로딩 중...</div>
            <div id="menu" class="menu-list">잠시만 기다려주세요.</div>
            <div id="calorie" class="calorie-tag">- kcal</div>
        </div>

        <div class="info-bar">
            <div class="info-box"><span>TIME</span> 12:50 - 13:50</div>
            <div class="info-box"><span>SCHOOL</span> 성일정보고등학교</div>
            <div class="info-box" id="time-display">00:00:00</div>
        </div>
    </div>

    <script>
        // --- JavaScript 시작 ---
        const officeCode = "J10";
        const schoolCode = "7530167";
        const key = "bdcd0ca692e6441a8522db4496c56216";

        async function getMeal() {
            const now = new Date();
            const isTomorrowMode = now.getHours() >= 14; // 오후 2시 이후인가?

            if (isTomorrowMode) {
                now.setDate(now.getDate() + 1);
            }

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const yyyymmdd = `${year}${month}${day}`;

            // 날짜 및 강조 효과 업데이트
            const dateElement = document.getElementById('date');
            const cardElement = document.querySelector('.main-card');
            
            if (isTomorrowMode) {
                // 내일 급식 모드일 때
                dateElement.innerHTML = `<span class="tomorrow-badge" style="display:inline-block;">TOMORROW</span>${year}년 ${month}월 ${day}일`;
                dateElement.style.color = "var(--accent-color)"; // 날짜 글자색 변경
                cardElement.classList.add('is-tomorrow'); // 왼쪽 테두리 색상 변경
            } else {
                // 오늘 급식 모드일 때
                dateElement.innerText = `${year}년 ${month}월 ${day}일`;
                dateElement.style.color = ""; // 기본 색상
                cardElement.classList.remove('is-tomorrow');
            }

            const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${key}&Type=json&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${schoolCode}&MLSV_YMD=${yyyymmdd}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row[0];
                    let cleanMenu = row.DDISH_NM
                        .replace(/[0-9.]/g, '')
                        .replace(/\(\)/g, '')
                        .split('<br/>')
                        .join(' · ');

                    document.getElementById('menu').innerText = cleanMenu;
                    document.getElementById('calorie').innerText = row.CAL_INFO;
                    document.getElementById('calorie').style.display = 'block';
                } else {
                    document.getElementById('menu').innerText = "급식 정보가 없습니다. 😎";
                    document.getElementById('calorie').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('menu').innerText = "데이터 로딩 실패";
                console.error(error);
            }
        }

        // 실시간 시계 기능
        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString();
        }

        // 실행
        getMeal();
        setInterval(updateTime, 1000);
        setInterval(getMeal, 1800000);
    </script>
</body>
</html>
