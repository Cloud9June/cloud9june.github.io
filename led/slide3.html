<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
        .poster-wrap { width:100%; height:100%; display:flex; justify-content:center; align-items:center; gap:8px; overflow:hidden; }
        .img-box { width:48%; height:100%; position:relative; overflow:hidden; }
        
        /* 대량 이미지 슬라이드 부하 감소를 위해 3D 가속 가웃 패치 */
        .img-box img { 
            width:100%; height:100%; object-fit:cover; 
            position:absolute; top:0; left:0; 
            transform: translate3d(100%, 0, 0); 
            will-change: transform;
            transition: transform 0.8s ease; 
        }
        .img-box img.active { transform: translate3d(0, 0, 0); z-index: 2; }
        .img-box img.exit { transform: translate3d(-100%, 0, 0); z-index: 1; }
    </style>
</head>
<body>
    <div class='poster-wrap'>
        <div class='img-box' id='box1'>
            <img src='posters/1.jpg' alt='모델 사진 1' class='active'>
            <img src='posters/3.jpg' alt='모델 사진 3'>
            <img src='posters/5.jpg' alt='모델 사진 5'>
            <img src='posters/7.jpg' alt='모델 사진 7'>
            <img src='posters/9.jpg' alt='모델 사진 9'>
        </div>
        <div class='img-box' id='box2'>
            <img src='posters/2.jpg' alt='모델 사진 2' class='active'>
            <img src='posters/4.jpg' alt='모델 사진 4'>
            <img src='posters/6.jpg' alt='모델 사진 6'>
            <img src='posters/8.jpg' alt='모델 사진 8'>
            <img src='posters/10.jpg' alt='모델 사진 10'>
        </div>
    </div>
    <script>
        function setupSlider(boxId, delayTime) {
            const box = document.getElementById(boxId);
            const imgs = box.getElementsByTagName('img');
            let currentIndex = 0;
            setTimeout(() => {
                setInterval(() => {
                    const prevIndex = currentIndex;
                    imgs[prevIndex].classList.remove('active');
                    imgs[prevIndex].classList.add('exit');
                    currentIndex = (currentIndex + 1) % imgs.length;
                    imgs[currentIndex].classList.remove('exit'); 
                    imgs[currentIndex].classList.add('active');
                    setTimeout(() => {
                        imgs[prevIndex].classList.remove('exit');
                    }, 800);
                }, 10000);
            }, delayTime);
        }
        setupSlider('box1', 0);
        setupSlider('box2', 1500);
    </script>
</body>
</html>
