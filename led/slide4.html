<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 사진 슬라이더 (16장)</title>
    <style>
        html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
        .poster-wrap { width:100%; height:100%; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .img-box { width:100%; height:100%; position:relative; overflow:hidden; }
        .img-box img { 
            width:100%; height:100%; object-fit:fill; 
            position:absolute; top:0; left:0; 
            opacity:0; 
            will-change: opacity;
            transition: opacity 1s ease-in-out; 
            z-index: 0;
        }
        .img-box img.active { opacity:1; z-index:1; }
    </style>
</head>
<body>

    <div class='poster-wrap'>
        <div class='img-box' id='student-slider-box'></div>
    </div>
    
    <script>
        function initSyncedSlider(boxId, totalImages, intervalTime) {
            const box = document.getElementById(boxId);
            let imgHTML = '';

            // 이미지 동적 생성
            for (let i = 1; i <= totalImages; i++) {
                imgHTML += `<img src="images/student (${i}).jpg" alt="학생 사진 ${i}">`;
            }
            box.innerHTML = imgHTML;

            const imgs = box.getElementsByTagName('img');
            let lastIndex = -1;

            // 밀리초 단위로 현재 시간을 체크하여 동기화 (화면 주사율에 맞춰 부드럽게 체크)
            function sync() {
                const now = Date.now();
                
                // 전체 루프 주기 (16장 * 8초 = 128초) 중 현재 지나고 있는 위치 계산
                const totalCycleTime = totalImages * intervalTime;
                const currentCycleProgress = now % totalCycleTime;
                
                // 현재 몇 번째 이미지가 나와야 하는지 인덱스 계산 (0 ~ 15)
                const currentIndex = Math.floor(currentCycleProgress / intervalTime);

                // 인덱스가 바뀔 때만 클래스 교체
                if (currentIndex !== lastIndex) {
                    if (lastIndex !== -1 && imgs[lastIndex]) {
                        imgs[lastIndex].classList.remove('active');
                    }
                    imgs[currentIndex].classList.add('active');
                    lastIndex = currentIndex;
                }
                
                requestAnimationFrame(sync);
            }
            
            sync();
        }

        // 함수 실행: 박스ID, 총 16장, 전환 속도 8초(8000ms)
        initSyncedSlider('student-slider-box', 16, 8000);
    </script>
</body>
</html>
