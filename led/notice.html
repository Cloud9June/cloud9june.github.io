<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --accent-color: #00ffcc;
      --text-color: #ffffff;
      --sub-text-color: #cccccc;
      --border-color: rgba(0, 255, 204, 0.2);
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0; padding: 0;
      overflow: hidden;
      display: flex; flex-direction: column;
      height: 100vh;
    }

    #slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .notice-slide {
      width: 85%; 
      max-width: 550px; 
      text-align: center;
    }

    .title {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--accent-color);
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .timetable-container {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1.8fr 0.7fr;
      align-items: center;
      padding: 8px 18px; /* 세로 여백 추가 축소 */
      border-bottom: 1px solid var(--border-color);
    }

    .time-row:last-child {
      border-bottom: none;
    }

    /* 교시와 과목 레이아웃 */
    .label-group {
      text-align: left;
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-color);
    }

    .subject {
      font-size: 0.85rem;
      font-weight: 400;
      color: #fff;
      margin-top: -2px;
      opacity: 0.9;
    }

    .time {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text-color);
    }

    .duration {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--sub-text-color);
      text-align: right;
    }

    .lunch-row {
      background: rgba(0, 255, 204, 0.06);
    }
    
    .lunch-row .label { color: #ffffff; }

    .indicators {
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dot {
      width: 20px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 2px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div id="slider-container">
    <div class="notice-slide">
      <div class="title">3월 전국연합학력평가 시간표</div>
      
      <div class="timetable-container">
        <div class="time-row">
          <div class="label-group">
            <span class="label">준비</span>
            <span class="subject">유의사항</span>
          </div>
          <span class="time">08:40 ~ 09:00</span>
          <span class="duration">20분</span>
        </div>
        
        <div class="time-row">
          <div class="label-group">
            <span class="label">1교시</span>
            <span class="subject">국어</span>
          </div>
          <span class="time">09:00 ∼ 10:20</span>
          <span class="duration">80분</span>
        </div>
        
        <div class="time-row">
          <div class="label-group">
            <span class="label">2교시</span>
            <span class="subject">수학</span>
          </div>
          <span class="time">10:30 ∼ 12:10</span>
          <span class="duration">100분</span>
        </div>
        
        <div class="time-row">
          <div class="label-group">
            <span class="label">3교시</span>
            <span class="subject">한국사</span>
          </div>
          <span class="time">12:20 ∼ 12:50</span>
          <span class="duration">30분</span>
        </div>
        
        <div class="time-row lunch-row">
          <div class="label-group">
            <span class="label">점심시간</span>
            <span class="subject">휴식</span>
          </div>
          <span class="time">12:50 ~ 13:50</span>
          <span class="duration">60분</span>
        </div>
        
        <div class="time-row">
          <div class="label-group">
            <span class="label">4교시</span>
            <span class="subject">영어</span>
          </div>
          <span class="time">13:50 ∼ 15:00</span>
          <span class="duration">70분</span>
        </div>
        
        <div class="time-row">
          <div class="label-group">
            <span class="label">5교시</span>
            <span class="subject">탐구</span>
          </div>
          <span class="time">15:10 ~ 16:30</span>
          <span class="duration">80분</span>
        </div>
      </div>
    </div>
  </div>

  <div class="indicators">
    <div class="dot"></div>
  </div>

</body>
</html>
