<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Wide Graduation Display - 3480x1044</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@700&display=swap');

        body {
            margin: 0; padding: 0;
            /* 와이드 해상도 고정 */
            width: 3480px; height: 1044px;
            overflow: hidden;
            background-color: #000;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단 현수막: 가로 전체 사용 */
        #banner-area {
            width: 3480px;
            height: 400px;
            background: #fff;
            z-index: 10;
            position: relative;
            border-bottom: 4px solid #e67e22; /* 경계선 포인트 */
            margin-bottom: 10px;
        }

        #banner-area img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* 가로로 긴 현수막 이미지 권장 */
            display: block;
        }

        /* 2. 하단 콘텐츠 영역 컨테이너 */
        #content-area {
            width: 3480px;
            height: 644px; /* 1044 - 200 */
            display: flex;
            gap: 10px;
        }

        /* 3. 좌우 2분할 화면 */
        .screen {
            width: calc(50% - 5px);
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* 중앙 구분선 스타일 (선택 사항) */
        #screen-left {
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .screen img {
            width: 100%;
            height: 100%;
            /* 사진의 비율을 유지하며 꽉 채움 */
            object-fit: fill;
            display: block;
        }

        /* 텍스트 오버레이 (이미지 위에 글자를 띄울 경우) */
        .overlay-text {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 60px; /* 해상도가 크므로 폰트도 크게 */
            text-shadow: 4px 4px 15px rgba(0,0,0,0.7);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header id="banner-area">
        <img src="images/new.jpg" alt="졸업 축하 와이드 현수막">
        </header>

    <main id="content-area">
        <div class="screen" id="screen-left">
            <img src="images/background_p.png" alt="좌측 콘텐츠">
            <!-- <div class="overlay-text">빛나는 우리의 추억</div> -->
        </div>
        <div class="screen" id="screen-right">
            <img src="images/classroom.jpg" alt="우측 콘텐츠">
            <!-- <div class="overlay-text">새로운 시작을 응원합니다</div> -->
        </div>
    </main>

</body>
</html>
