<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오월 부스 홍보물</title>
    <style>
        /* 기본 초기화 및 비디오월 풀스크린 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000; /* 홍보물이 돋보이도록 배경은 블랙 */
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 스크롤바 제거 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 이미지들을 정렬할 그리드 컨테이너 */
        .promo-container {
            width: 100%;
            height: 100%;
            padding: 20px; /* 외곽 여백 (필요 없으면 0으로 수정 가능) */
            display: grid;
            /* 
               [팁] 이미지 개수에 따라 크기를 자동으로 조절합니다. 
               현재는 최소 400px 크기로 빈틈없이 채우도록 설정되어 있습니다. 
            */
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px; /* 이미지와 이미지 사이의 간격 */
            justify-content: center;
            align-content: center;
        }

        /* 개별 이미지 카드 설정 */
        .promo-item {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 8px; /* 부드러운 라운드 처리 (급할 땐 0으로 해도 무방) */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* 입체감 효과 */
        }

        .promo-item img {
            width: 100%;
            height: 100%;
            /* 
               [중요] object-fit: contain; -> 이미지 비율을 유지하며 전체 다 보이게 합니다.
               만약 찌그러짐 없이 꽉 채우고 싶다면 'cover'로 변경하세요.
            */
            object-fit: contain; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="promo-container">
        <!-- 
            [사용법] 홍보물 이미지 파일명(경로)을 src에 넣어주세요. 
            개수가 늘어나면 그리드가 자동으로 배치해 줍니다. 
        -->
        <div class="promo-item">
            <img src="posters/1.jpg" alt="부스 홍보물 1">
        </div>
        <div class="promo-item">
            <img src="posters/2.jpg" alt="부스 홍보물 1">
        </div>
        <div class="promo-item">
            <img src="posters/3.jpg" alt="부스 홍보물 1">
        </div>
        <div class="promo-item">
