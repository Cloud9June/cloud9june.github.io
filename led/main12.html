<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오월 부스 홍보물</title>
    <style>
        /* 기본 초기화 및 비디오월 풀스크린 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 스크롤바 제거 */
            display: flex;
            flex-direction: row; /* 왼쪽 타이틀바와 오른쪽 그리드를 가로 배치 */
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 왼쪽에 세로로 두 줄 글씨가 들어갈 타이틀 바 */
        .side-title-bar {
            width: 10vw; 
            height: 100%;
            background: linear-gradient(135deg, #1e1b4b, #311042); /* 딥 퍼플-네이비 그라데이션 */
            display: flex;
            flex-direction: row-reverse; /* 세로 두 줄 우측부터 정렬 */
            justify-content: center;
            align-items: center;
            gap: 15px; 
            border-right: 1px solid #2e1052; /* 타이틀 바 경계선도 최소화 */
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.7);
            z-index: 10;
            padding: 0 10px;
        }

        /* 메인 큰 글씨 스타일 */
        .main-title {
            color: #ffffff;
            font-size: 2.8rem; 
            font-weight: 900;
            letter-spacing: 1rem;
            writing-mode: vertical-rl;
            text-orientation: upright;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(139, 92, 246, 0.4);
        }

        /* 서브 슬로건 글씨 스타일 */
        .sub-title {
            color: #a78bfa;
            font-size: 1.4rem; 
            font-weight: 600;
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;
            text-orientation: upright;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
            opacity: 0.9;
        }

        /* 우측 그리드 컨테이너 */
        .promo-container {
            flex: 1;
            height: 100%;
            padding: 30px; /* 외곽 여백으로 여유 공간 확보 */
            display: grid;
            grid-template-columns: repeat(12, 1fr); /* 9열 구조 */
            gap: 15px; 
            justify-content: center;
            align-content: center;
            position: relative;
        }

        /* 개별 이미지 카드 설정 */
        .promo-item {
            position: relative;
            width: 100%;
            height: 100%;
            
            /* 포스터가 커질 때 원본 비율 마진이 박스에 잘리지 않도록 유연하게 설정 */
            overflow: visible; 
            
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background-color: #000;
            
            /* 평소 크기 고정 scale(1) */
            transform: scale(1) translate(0px, 0px); 
            
            /* 이동과 복귀 모션 밸런스를 맞춘 트랜지션 */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.8s ease, z-index 0.3s ease;
            z-index: 1; 
        }

        .promo-item img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 평소 정렬 상태에서 원본 형태 그대로 보존 */
            display: block;
            border-radius: 6px;
        }

        /* 중앙으로 이동하면서 1.5배 대형 확대 */
        .promo-item.highlight {
            z-index: 100; /* 최상위 레이어로 인상 */
            transform: translate(var(--move-x), var(--move-y)) scale(1.5) !important;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(139, 92, 246, 0.4);
        }

        /* 주변 포스터들을 차분하게 가려줄 오버레이 설정 */
        .promo-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); /* 딤 효과 강도 */
            z-index: 2; 
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            border-radius: 6px;
        }

        /* 한 포스터가 하이라이트 되면, 나머지 포스터들에만 딤 오버레이 적용 */
        .promo-container.active-dim .promo-item:not(.highlight)::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="side-title-bar">
        <div class="main-title">성일정보고</div>
        <div class="sub-title">우리의 순간, 우리의 축제</div>
    </div>

    <div class="promo-container" id="gridContainer">
        <div class="promo-item"><img src="posters/1.jpg" alt="부스 홍보물 1"></div>
        <div class="promo-item"><img src="posters/2.jpg" alt="부스 홍보물 2"></div>
        <div class="promo-item"><img src="posters/3.jpg" alt="부스 홍보물 3"></div>
        <div class="promo-item"><img src="posters/4.jpg" alt="부스 홍보물 4"></div>
        <div class="promo-item"><img src="posters/5.jpg" alt="부스 홍보물 5"></div>
        <div class="promo-item"><img src="posters/6.jpg" alt="부스 홍보물 6"></div>
        <div class="promo-item"><img src="posters/7.jpg" alt="부스 홍보물 7"></div>
        <div class="promo-item"><img src="posters/8.jpg" alt="부스 홍보물 8"></div>
        <div class="promo-item"><img src="posters/9.jpg" alt="부스 홍보물 9"></div>
        <div class="promo-item"><img src="posters/10.jpg" alt="부스 홍보물 10"></div>
        <div class="promo-item"><img src="posters/11.png" alt="부스 홍보물 11"></div>
        <div class="promo-item"><img src="posters/12.png" alt="부스 홍보물 12"></div>
        <div class="promo-item"><img src="posters/13.png" alt="부스 홍보물 13"></div>
        <div class="promo-item"><img src="posters/14.png" alt="부스 홍보물 14"></div>
        <div class="promo-item"><img src="posters/15.png" alt="부스 홍보물 15"></div>
        <div class="promo-item"><img src="posters/16.png" alt="부스 홍보물 16"></div>
        <div class="promo-item"><img src="posters/17.png" alt="부스 홍보물 17"></div>
        <div class="promo-item"><img src="posters/18.png" alt="부스 홍보물 18"></div>
        <div class="promo-item"><img src="posters/19.jpg" alt="부스 홍보물 19"></div>
        <div class="promo-item"><img src="posters/20.jpg" alt="부스 홍보물 20"></div>
        <div class="promo-item"><img src="posters/21.png" alt="부스 홍보물 21"></div>
        <div class="promo-item"><img src="posters/22.png" alt="부스 홍보물 22"></div>
        <div class="promo-item"><img src="posters/23.png" alt="부스 홍보물 23"></div>
        <div class="promo-item"><img src="posters/24.png" alt="부스 홍보물 24"></div>
        <div class="promo-item"><img src="posters/25.png" alt="부스 홍보물 25"></div>
        <div class="promo-item"><img src="posters/26.png" alt="부스 홍보물 26"></div>
        <div class="promo-item"><img src="posters/27.png" alt="부스 홍보물 27"></div>
        <div class="promo-item"><img src="posters/28.png" alt="부스 홍보물 28"></div>
        <div class="promo-item"><img src="posters/29.png" alt="부스 홍보물 29"></div>
        <div class="promo-item"><img src="posters/30.png" alt="부스 홍보물 30"></div>
        <div class="promo-item"><img src="posters/31.jpg" alt="부스 홍보물 31"></div>
        <div class="promo-item"><img src="posters/32.png" alt="부스 홍보물 32"></div>
        <div class="promo-item"><img src="posters/33.jpg" alt="부스 홍보물 33"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("gridContainer");
            const items = document.querySelectorAll(".promo-item");
            const viewTime = 4500; // 팝업 유지 시간 (4.5초)

            let randomSequence = []; // 무작위 인덱스 순서를 담을 배열
            let sequenceIndex = 0;   // 현재 랜덤 배열 내에서의 진행 순서

            // 피셔-예이츠 기반의 중복 없는 셔플 함수
            function createRandomSequence() {
                // 1. 0부터 32까지 인덱스 배열 생성
                let indices = Array.from({ length: items.length }, (_, i) => i);
                
                // 2. 무작위로 완전히 뒤섞기
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                
                randomSequence = indices;
                sequenceIndex = 0; // 한 사이클 완료 후 초기화
            }

            function playHighlight() {
                // [체크] 한 사이클(33개)을 다 돌았다면 순서를 새로 무작위로 섞음
                if (sequenceIndex >= randomSequence.length) {
                    createRandomSequence();
                }

                // 이번 차례에 띄울 랜덤 포스터 인덱스 추출
                const currentPosterIndex = randomSequence[sequenceIndex];
                const target = items[currentPosterIndex];

                // 1. 모든 아이템 상태 초기화 (제자리 복귀)
                items.forEach(item => {
                    item.classList.remove("highlight");
                    item.style.setProperty('--move-x', '0px');
                    item.style.setProperty('--move-y', '0px');
                });
                container.classList.remove("active-dim");

                // 2. 미세한 텀(0.1초)을 두고 계산된 타겟을 화면 중앙으로 팝업
                setTimeout(() => {
                    // 우측 그리드 영역(container)의 중심 좌표 계산
                    const containerRect = container.getBoundingClientRect();
                    const containerCenterX = containerRect.left + containerRect.width / 2;
                    const containerCenterY = containerRect.top + containerRect.height / 2;

                    // 선택된 포스터의 원래 자리 중심 좌표 계산
                    const targetRect = target.getBoundingClientRect();
                    const targetCenterX = targetRect.left + targetRect.width / 2;
                    const targetCenterY = targetRect.top + targetRect.height / 2;

                    // 정중앙 이동 거리(X, Y) 연산
                    const moveX = containerCenterX - targetCenterX;
                    const moveY = containerCenterY - targetCenterY;

                    // CSS 프로퍼티 변수로 동적 연산 좌표값 바인딩
                    target.style.setProperty('--move-x', `${moveX}px`);
                    target.style.setProperty('--move-y', `${moveY}px`);
                    
                    container.classList.add("active-dim");
                    target.classList.add("highlight");

                    // 다음 포스터 순서로 전진
                    sequenceIndex++;
                }, 100); 
            }

            // 첫 가동 시 즉시 랜덤 배열을 한 세트 만들어 루프 가동
            createRandomSequence();
            playHighlight();
            setInterval(playHighlight, viewTime);
        });
    </script>
</body>
</html>
