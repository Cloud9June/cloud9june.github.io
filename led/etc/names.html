        ];

        const canvas = document.getElementById('cloud-canvas');

        function generateWordsList() {
            const list = [];
            list.push(["성일정보고 1학년", 85]);
            list.push(["입학 100일 축하해🎉", 100]);

            studentNames.forEach(name => {
                // 이름을 더 꽉 차게 보이도록 기본 폰트 사이즈를 상향 조정 (16~28)
                const randomSize = Math.floor(Math.random() * 13) + 16;
                list.push([name, randomSize]);
            });
            return list;
        }

        function drawWordCloud() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 매 렌더링마다 이름 크기와 배치를 다르게 하기 위해 리스트 새로 생성
            const currentList = generateWordsList();

            WordCloud(canvas, {
                list: currentList,
                fontFamily: "'Pretendard', 'Malgun Gothic', sans-serif",
                fontWeight: 'bold',
                color: function () {
                    const colors = ['#FFB6C1', '#FFD700', '#87CEFA', '#98FB98', '#FFA07A', '#DDA0DD', '#F0E68C', '#FFFFFF'];
                    return colors[Math.floor(Math.random() * colors.length)];
                },
                backgroundColor: 'transparent',
                // 변경 포인트 1: 모양을 사각형으로 지정하여 모서리 빈 공간 최소화
                shape: 'square', 
                // 변경 포인트 2: 그리드 크기를 줄여서 단어들이 더 촘촘하게 붙도록 유도
                gridSize: 8, 
                minSize: 10,
                shrinkToFit: true,
                drawOutOfBound: false
            });
        }

        // 최초 1회 실행
        drawWordCloud();

        // 변경 포인트 3: 1분(60000 밀리초)마다 drawWordCloud 함수 반복 실행
        setInterval(drawWordCloud, 60000);

        // 창 크기 변경 시 대응 (디바운스 유지)
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(drawWordCloud, 200);
        });

</body>
</html>
