<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분할 레이아웃 웹페이지</title>
    <style>
        /* 기본 여백 초기화 및 배경색 검은색(#000) 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 전체 화면 스크롤 방지 */
            background-color: #000; /* 배경 블랙 */
            font-family: sans-serif;
        }

        /* 전체 화면을 좌우로 정확히 이등분 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 영역: 증명사진 (전체 화면의 50% 차지) */
        .left-side {
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* 비율을 유지하며 왼쪽 영역에 꽉 차게 설정 */
        .id-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: 50% 20%;
        }

        /* 오른쪽 영역: 전체 화면의 50% 차지하며 상하로 배치 */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* 오른쪽 상하 영역을 정확히 50%씩 고정 분할 (높이 고정) */
        .content-box {
            flex: 1; /* 상하 각각 50%씩 균등 배분 */
            height: 50%; /* 높이 고정 */
            width: 100%;
            padding: 20px; /* 이미지 주변 여백 (원치 않으시면 0으로 변경 가능) */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* 이미지 세로가 고정된 칸보다 길어지면 박스 안에서 스크롤 */
        }

        /* 가로 100% 채우고 세로는 비율대로 조절 */
        .responsive-img {
            width: 40%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <img src="../images/3star_4.png" alt="증명사진" class="id-photo">
        </div>

        <div class="right-side">
            <div class="content-box">
                <img src="../images/3star_3.svg" alt="우상단 이미지" class="responsive-img">
            </div>
            
            <div class="content-box">
                <img src="../images/3star_2.svg" alt="우하단 이미지" class="responsive-img">
            </div>
        </div>
    </div>

</body>
</html>
