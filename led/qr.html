<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --accent-color: #00ffcc;
      --text-color: #ffffff;
      --sub-text-color: #cccccc;
      --border-color: rgba(0, 255, 204, 0.2);
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0; padding: 0;
      overflow: hidden;
      display: flex; flex-direction: column;
      height: 100vh;
      perspective: 1000px;
    }

    #slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px; /* 전체 패딩 축소 */
    }

    /* 30초 회전 애니메이션 */
    @keyframes rotateCard {
      0% { transform: rotateY(0deg); }
      92% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    /* 테두리 빛 애니메이션 */
    @keyframes rotateBorder {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); border-color: rgba(0, 255, 204, 0.3); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); border-color: rgba(0, 255, 204, 0.6); }
    }

    .notice-slide {
      width: 90%; 
      max-width: 480px; /* 최대폭을 살짝 줄여 짤림 방지 */
      text-align: center;
      animation: rotateCard 30s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-style: preserve-3d;
    }

    /* --- 타이틀 애니메이션 (짤림 방지 처리) --- */
    .title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent-color);
      margin-bottom: 20px;
      padding-top: 20px; /* 튀어오를 때 위쪽 공간 확보 */
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
      display: flex;
      justify-content: center;
      gap: 3px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); } /* 튀는 높이 조절 */
    }

    .title span {
      display: inline-block;
      animation: bounce 1.5s ease-in-out infinite;
    }

    .title span:nth-child(1) { animation-delay: 0.0s; }
    .title span:nth-child(2) { animation-delay: 0.1s; }
    .title span:nth-child(3) { animation-delay: 0.2s; }
    .title span:nth-child(4) { animation-delay: 0.3s; }
    .title span:nth-child(5) { animation-delay: 0.4s; }

    /* QR 컨테이너 */
    .qr-container {
      border: 2px solid var(--accent-color);
      border-radius: 20px;
      padding: 30px 15px; /* 내부 여백 최적화 */
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: rotateBorder 3s ease-in-out infinite;
    }

    .qr-image {
      width: 180px; /* 크기 소폭 축소 */
      height: 180px;
      border-radius: 12px;
      padding: 8px;
      background: white;
      margin-bottom: 20px;
    }

    .message {
      font-size: 1.25rem; /* 가독성 유지하며 크기 최적화 */
      font-weight: 700;
      color: var(--text-color);
      line-height: 1.5;
      word-break: keep-all;
    }

    .highlight {
      color: var(--accent-color);
      font-weight: 900;
    }

    .sub-message {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--sub-text-color);
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 15px;
    }

    /* 하단 인디케이터 */
    .indicators {
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes loadingBar {
      0% { width: 0%; opacity: 0.4; }
      100% { width: 100%; opacity: 1; }
    }

    .dot-bg {
      width: 150px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .dot-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      background: var(--accent-color);
      animation: loadingBar 30s linear infinite;
    }
  </style>
</head>
<body>

  <div id="slider-container">
    <div class="notice-slide">
      <div class="title">
        <span>E</span><span>V</span><span>E</span><span>N</span><span>T</span>
      </div>
      
      <div class="qr-container">
        <img src="images/qr.jpg" alt="QR Code" class="qr-image">
        
        <div class="message">
            매주 QR 찍고 응원 멘트 남기면<br>
            <span class="highlight">베스트 멘트</span>를 뽑아 <span class="highlight">선물</span>을 드립니다!
        </div>

        <div class="sub-message">
            매주 새로운 당첨의 기회, 지금 바로 참여하세요!
        </div>
      </div>
    </div>
  </div>

  <div class="indicators">
    <div class="dot-bg">
      <div class="dot-fill"></div>
    </div>
  </div>

</body>
</html>
