<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새내기 100일 축하 편지 비디오월</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f8fafc; /* 밝고 깨끗한 배경 */
            color: #334155; /* 부드러운 다크 그레이 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 📺 비디오월 A4 비율 컨테이너 (1 : 1.414) */
        .video-wall-container {
            width: 100vh; /* 화면 높이에 맞춰 꽉 차게 설정 */
            max-width: 100vw;
            aspect-ratio: 1 / 1.414; /* 정확한 A4 비율 */
            background: linear-gradient(135deg, #e0f7fa, #fce4ec); /* 상큼한 파스텔 핑크&블루 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border-radius: 12px;
        }

        /* 공통 씬(Scene) 스타일 */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            text-align: center;
        }

        /* --- 🌸 Scene 1: 오프닝 --- */
        .scene-1 {
            background: linear-gradient(135deg, #fff9c4, #e3f2fd);
        }
        .intro-text {
            font-size: 2rem;
            line-height: 1.7;
            font-weight: 600;
            margin-bottom: 3rem;
            color: #5c6bc0;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.03);
        }
        .counter-wrapper {
            font-size: 9rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff8a80, #ffd740);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(255,138,128,0.3));
        }

        /* --- 📸 Scene 2: 포토 슬라이드 --- */
        .scene-2 {
            background: linear-gradient(135deg, #f1f8e9, #f3e5f5);
            justify-content: flex-start;
            padding-top: 5rem;
        }
        .scene-2-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #475569;
            margin-bottom: 2.5rem;
            background: linear-gradient(to right, #0284c7, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .photo-grid {
            position: relative;
            width: 90%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .polaroid {
            position: absolute;
            width: 80%;
            background: white;
            padding: 1rem 1rem 3.5rem 1rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
            border: 4px solid #fff;
            border-radius: 4px;
            transform: scale(0.9);
            opacity: 0;
        }
        .polaroid img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 2px;
        }
        .photo-caption {
            font-size: 1.6rem;
            color: #374151;
            font-weight: 700;
            margin-top: 1.2rem;
            text-align: center;
        }
        .scene-2-subtitle {
            font-size: 1.6rem;
            font-weight: 600;
            color: #6b7280;
            line-height: 1.5;
        }

        /* --- 💌 Scene 3: 축하 편지 (타이핑 연출) --- */
        .scene-3 {
            background: linear-gradient(135deg, #e0f2f1, #e1f5fe);
            justify-content: center;
            padding-top: 5rem;
        }
        .letter-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #00796b;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }
        .letter-container {
            width: 90%;
            height: 70%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 3rem;
            text-align: left;
            position: relative;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        /* 편지 한 줄 스타일 */
        .letter-line {
            font-size: 1.6rem;
            line-height: 1.9;
            font-weight: 500;
            margin-bottom: 1.2rem;
            color: #374151;
            opacity: 0; /* 초기엔 투명 */
        }
        /* 강조 */
        .highlight {
            color: #f57c00;
            font-weight: 700;
        }
        .last-line {
            text-align: right;
            font-weight: 700;
            margin-top: 2rem;
            color: #0277bd;
        }
    </style>
</head>
<body>

    <div class="video-wall-container">
        
        <div class="scene scene-1">
            <div class="intro-text" id="typing-text"></div>
            <div class="counter-wrapper"><span id="count">0</span>일</div>
        </div>

        <div class="scene scene-2">
            <div class="scene-2-title">우리가 함께한 100일의 기적 ✨</div>
            <div class="photo-grid">
                <div class="polaroid" id="photo1">
                    <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754?w=600" alt="입학식">
                    <div class="photo-caption">🌸 설레던 첫 입학식날</div>
                </div>
                <div class="polaroid" id="photo2">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600" alt="수업시간">
                    <div class="photo-caption">✍️ 열정 가득했던 교실</div>
                </div>
                <div class="polaroid" id="photo3">
                    <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=600" alt="친구들">
                    <div class="photo-caption">🍱 함께라 즐거운 급식 시간</div>
                </div>
            </div>
            <div class="scene-2-subtitle">바쁘게 지나간 설렘 가득한 순간들</div>
        </div>

        <div class="scene scene-3">
            <div class="letter-title">우리가 전하는 진심의 편지 💌</div>
            <div class="letter-container" id="letter-container">
                </div>
        </div>

    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        const mainTimeline = gsap.timeline({ repeat: -1 });
        let countObj = { value: 0 };
        let isFirstRun = true;

        // 하나의 편지 내용 (멀리서도 한눈에 보이게 한 줄씩 구성)
        const letterContent = [
            "사랑스러운 신입생 여러분, 100일을 진심으로 축하합니다.",
            "낯선 학교생활에 적응하느라 정말 고생 많았어요.",
            "때로는 수행평가에 지치고, 때로는 고민에 잠 못 이뤘겠지만,",
            "여러분은 그 모든 순간을 멋지게 이겨냈습니다.",
            "그 시간 속에서 여러분은 눈부시게 성장했습니다.",
            "선생님들과 선배들은 <span class='highlight'>여러분의 모든 시작</span>을",
            "<span class='highlight'>언제나 응원하고 함께할 것입니다.</span>",
            "파릇파릇한 여러분의 고교 생활이 더 빛나길 바랍니다.",
            "축하하고, 사랑합니다.",
            "<span class='last-line'>- 학교 구성원 일동 -</span>"
        ];

        /* --------------------------------------------------
           SCENE 1 애니메이션
        -------------------------------------------------- */
        mainTimeline
            .to(".scene-1", { opacity: 1, duration: 1.2 })
            .to("#typing-text", { 
                text: "낯설던 교문, 어색했던 교복...<br>우리가 숨 가쁘게 달려온 시간.", 
                duration: 2.8, 
                ease: "none" 
            })
            .to(countObj, {
                value: 100,
                duration: 2.2,
                ease: "power2.out",
                onStart: function() {
                    if (!isFirstRun) countObj.value = 100;
                },
                onUpdate: function() {
                    document.getElementById("count").innerText = Math.floor(countObj.value);
                }
            }, "-=0.5")
            .to(".counter-wrapper", { scale: 1.1, duration: 0.6, yoyo: true, repeat: 1 }, "-=1")
            .to(".scene-1", { opacity: 0, duration: 1.2, delay: 2 });

        /* --------------------------------------------------
           SCENE 2 애니메이션
        -------------------------------------------------- */
        mainTimeline
            .to(".scene-2", { opacity: 1, duration: 1.2 })
            .to("#photo1", { opacity: 1, scale: 1, rotation: -4, duration: 0.9, ease: "back.out(1.5)" })
            .to("#photo2", { opacity: 1, scale: 1, rotation: 4, duration: 0.9, ease: "back.out(1.5)" }, "+=0.7")
            .to("#photo3", { opacity: 1, scale: 1, rotation: -1, duration: 0.9, ease: "back.out(1.5)" }, "+=0.7")
            .to(".scene-2-subtitle", { scale: 1.03, duration: 1.2, yoyo: true, repeat: 1 }, "+=0.5")
            .to(".scene-2", { opacity: 0, duration: 1.2, delay: 2 })
            .set(".polaroid", { opacity: 0, scale: 0.9 }); 

        /* --------------------------------------------------
           SCENE 3 애니메이션 (하나의 긴 편지 타이핑)
        -------------------------------------------------- */
        const container = document.getElementById("letter-container");
        let letterTL = gsap.timeline(); // 편지만을 위한 내부 타임라인

        // 편지 내용을 HTML 엘리먼트로 변환하여 추가 (숨김 상태)
        letterContent.forEach((text, index) => {
            const line = document.createElement("p");
            line.className = "letter-line";
            line.innerHTML = index === 0 ? text : text; // HTML 태그 허용
            line.id = `line-${index}`;
            container.appendChild(line);
        });

        mainTimeline
            .to(".scene-3", { opacity: 1, duration: 1.2 })
            // 편지 타이핑 연출
            .call(() => {
                letterTL.clear(); // 루프 시작 시 편지 타임라인 초기화
                // 모든 줄 초기화
                gsap.set(".letter-line", { opacity: 0, y: 15 });

                // 각 줄을 순차적으로 타이핑 & 등장
                letterContent.forEach((text, index) => {
                    letterTL
                        // 다음 줄 등장 (부드러운 페이드인 + 위로 올라옴)
                        .to(`#line-${index}`, { opacity: 1, y: 0, duration: 1.2, ease: "power2.out" })
                        // 읽을 시간 확보
                        .to({}, { duration: 2.2 }); 

                    // 줄이 너무 많아지면 이전 줄을 흐리게 처리 (가독성 유지)
                    if (index > 4) {
                        letterTL.to(`#line-${index - 5}`, { opacity: 0.2, duration: 0.8, ease: "power1.inOut" }, "-=1.5");
                    }
                });
            })
            // 편지 타이핑 동안 대기 (전체 편지 길이에 맞춰 조절 필요)
            .to({}, { duration: letterContent.length * 4.2 }) // 편지 전체 진행 시간 대기
            .to(".scene-3", { opacity: 0, duration: 1.2 })
            // 마지막 라운드 플래그 업데이트
            .call(() => { isFirstRun = false; });
    </script>
</body>
</html>
