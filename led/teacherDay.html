<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스승의 날 감사 나무 - 대규모 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #fdfcf0; 
            font-family: 'Nanum Pen Script', cursive;
            width: 100vw; height: 100vh;
        }

        #main-wrapper {
            width: 100%; height: 100%;
            position: relative;
            background-image: url('images/thank3.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        #canvas {
            width: 100%; height: 100%;
            position: absolute;
            top: 0; left: 0;
            transition: opacity 2s ease-in-out;
            z-index: 10;
        }

        .memo {
            position: absolute;
            /* 📏 메모 크기 수정 (여기서 조절하세요) */
            width: 250px; 
            height: 250px; 
            padding: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transform: scale(0);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s;
            will-change: transform, opacity;
        }

        .memo.show { transform: scale(1) rotate(var(--r)); opacity: 1; }

        /* 💙 폰트 사이즈 수정 (여기서 조절하세요) */
        .target { font-size: 1.3rem; color: #1e88e5; font-weight: bold; margin-bottom: 8px; }
        .content { font-size: 1.5rem; color: #333; line-height: 1.3; word-break: break-all; margin-bottom: 8px; }
        .author { font-size: 1.1rem; color: #5d4037; font-weight: bold; border-top: 1px dashed rgba(0,0,0,0.1); width: 100%; padding-top: 6px; }

        .c1 { background-color: rgba(255, 224, 230, 0.95); } 
        .c2 { background-color: rgba(255, 243, 191, 0.95); } 
        .c3 { background-color: rgba(209, 250, 229, 0.95); } 
        .c4 { background-color: rgba(224, 242, 254, 0.95); } 
        .c5 { background-color: rgba(243, 232, 255, 0.95); } 

        .star { position: absolute; color: #fff; pointer-events: none; z-index: 9999; text-shadow: 0 0 5px #fff, 0 0 10px #ffd700, 0 0 20px #ffaa00; display: flex; justify-content: center; align-items: center; }
        @keyframes star-twinkle { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 50% { transform: scale(1.5) rotate(180deg); opacity: 1; } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }

        #final-message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); font-size: 6.5rem; color: #d32f2f; text-align: center; opacity: 0; pointer-events: none; z-index: 100; text-shadow: 2px 2px 20px rgba(255,255,255,1); transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }
        #final-message.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="canvas"></div>
    <div id="final-message">선생님 늘 감사합니다!<br>사랑해요 ❤️</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxTnrJqRT3kuJlC3OQMCmqIW8Ns9uPGcA2xrjDDpreLYiZL-wc5GcnDiR9aCYSw_gMF/exec";
    const canvas = document.getElementById('canvas');
    const finalMsg = document.getElementById('final-message');
    let messages = [];
    let currentIndex = 0;
    const colors = ['c1', 'c2', 'c3', 'c4', 'c5'];

    async function fetchMessages() {
        try {
            const res = await fetch(API_URL);
            messages = await res.json();
            startEvent();
        } catch (e) { console.error("데이터 로드 실패", e); setTimeout(fetchMessages, 5000); }
    }

    function createStars() {
        const starCount = 180;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerText = '★';
            star.style.fontSize = Math.random() * 10 + 10 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animation = `star-twinkle ${Math.random() * 1.5 + 1}s infinite ${Math.random() * 2}s ease-in-out`;
            document.body.appendChild(star);
        }
    }

    function removeStars() { document.querySelectorAll('.star').forEach(s => s.remove()); }

    function spawnMemo() {
        if (currentIndex >= messages.length) {
            createStars();
            setTimeout(clearCanvas, 5000); 
            return;
        }

        const item = messages[currentIndex];
        const memo = document.createElement('div');
        const rotate = (Math.random() * 20 - 10).toFixed(2); // 회전 반경을 줄여서 잘림 방지
        
        // 📐 메모 크기 정보 (CSS 설정값과 동일하게 맞추세요)
        const memoWidth = 250;
        const memoHeight = 250;

        // 🛡️ 화면 밖으로 나가지 않도록 좌표 범위 제한
        // 가로: 0 ~ (화면너비 - 메모너비)
        const posX = Math.random() * (window.innerWidth - memoWidth);
        // 세로: 0 ~ (화면높이의 55% - 메모높이)
        const posY = Math.random() * (window.innerHeight * 0.55 - memoHeight); 

        memo.className = `memo ${colors[currentIndex % colors.length]}`;
        // 안전 범위 내에서 좌표 설정 (음수가 되지 않도록 Math.max 사용)
        memo.style.left = `${Math.max(10, posX)}px`; 
        memo.style.top = `${Math.max(10, posY)}px`;
        memo.style.setProperty('--r', `${rotate}deg`);
        
        const targetName = item.target ? `${item.target}` : "선생님께";

        memo.innerHTML = `
            <div class="target">${targetName}</div>
            <div class="content">${item.content}</div>
            <div class="author">From. ${item.name}</div>
        `;

        canvas.appendChild(memo);
        setTimeout(() => memo.classList.add('show'), 50);

        currentIndex++;
        const speed = messages.length > 500 ? 1500 : 1500;
        setTimeout(spawnMemo, speed);
    }

    function clearCanvas() {
        canvas.style.opacity = "0";
        setTimeout(() => finalMsg.classList.add('active'), 1000);
        setTimeout(() => {
            finalMsg.classList.remove('active');
            removeStars();
            setTimeout(() => {
                canvas.innerHTML = '';
                canvas.style.opacity = "1";
                currentIndex = 0;
                fetchMessages(); 
            }, 1500);
        }, 7000);
    }

    function startEvent() {
        if (messages.length > 0) {
            canvas.innerHTML = '';
            canvas.style.opacity = "1";
            currentIndex = 0;
            spawnMemo();
        } else { setTimeout(fetchMessages, 5000); }
    }

    window.onload = fetchMessages;
</script>
</body>
</html>
